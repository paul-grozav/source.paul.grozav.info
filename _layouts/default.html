<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

  <body>

    {% comment %}
      {% include header.html %}
    {% endcomment %}


    <div class="app-layout-wrapper">

    <aside class="app-sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>{{ site.title }}</h3>
      </div>
      <nav class="sidebar-nav">
        {% include folder-tree.html %}
      </nav>
      {% include footer.html %}
    </aside>

    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">
      <span class="toggle-arrow">◀</span>
    </button>

    <main class="app-main-content">
      <article class="page-body">
        <h1>{{ page.title }}</h1>
        {{ content }}
      </article>
    </main>

  </div>

<script>
  // sidebar default state should be expanded
  var sidebar_state = "expanded";
  (function() {
    // Failsafe execution block
    function initSidebarToggle() {
      const sidebar = document.getElementById("sidebar");
      const toggleBtn = document.getElementById("sidebar-toggle");

      if (!sidebar || !toggleBtn) {
        console.warn("Sidebar elements missing! Retrying configuration...");
        return false;
      }

      // Check browser cache memory state immediately
      if (sidebar_state === "collapsed") {
        sidebar.classList.add("collapsed");
      }

      // Explicit click handler
      toggleBtn.onclick = function(e) {
        e.preventDefault();
        sidebar.classList.toggle("collapsed");

        if (sidebar.classList.contains("collapsed")) {
          sidebar_state = "collapsed";
        } else {
          sidebar_state = "expanded";
        }
      };

      console.log("Sidebar toggle engine loaded successfully.");
      return true;
    }

    // Run immediately, fallback to DOMContentLoaded loop if layout isn't fully drawn
    if (!initSidebarToggle()) {
      document.addEventListener("DOMContentLoaded", initSidebarToggle);
    }
  })();
</script>
  </body>
</html>
