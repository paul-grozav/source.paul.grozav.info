<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.min.js" integrity="sha512-BHJlu9vUXVrcxhRwbBdNv3uTsbscp8pp3LJ5z/sw9nBJUegkNlkcZnvODRgynJWhXMCsVUGZlFuzTrr5I2X3sQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
(function() {
  var new_editor_div = document.createElement("div");
  new_editor_div.innerHTML = "Loading file ...";
  var current_script = document.scripts[document.scripts.length - 1];
  current_script.parentElement.insertBefore(new_editor_div, current_script);
  new_editor_div.style.width = "100%";
  new_editor_div.style.height = "100%";

  var editor = ace.edit(new_editor_div);
  editor.setTheme("ace/theme/monokai");
  editor.session.setMode("ace/mode/javascript");
  var url = "{{ include.url }}";
  $.ajax({
    url: url,
    type:"get",
    dataType: "text",
    error: function(data){
      //debugger;
      editor.setValue("Error loading file!. See {{ include.url }}");
      editor.gotoLine(1);
    },
    success: function(data){
      editor.setValue(data, 1);
      editor.gotoLine(1);
    }
  });
  editor.setReadOnly(true);
  editor.setOptions({
    maxLines: Infinity
  });
})();
</script>
