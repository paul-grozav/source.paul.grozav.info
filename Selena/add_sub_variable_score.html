<header>
  <h1>🧠 Toddler Math</h1>
  <div id="score">✅ 0 | ❌ 0</div>
</header>

<div id="question">Preparing...</div>

<div class="button-grid" id="buttons">
  </div>

<div id="feedback"></div>

<script>
// --- CONFIGURATION ---
const maxLimit = 20; // Change this to 10, 30, 50, etc.
// ---------------------

let num1, num2, operation, correctAnswer;
let correctCount = 0;
let wrongCount = 0;

function updateScore() {
  document.getElementById("score").textContent = `✅ ${correctCount} | ❌ ${wrongCount}`;
}

function newQuestion() {
  operation = Math.random() < 0.5 ? '+' : '-';

  if (operation === '+') {
    // Ensure sum doesn't exceed maxLimit
    num1 = Math.floor(Math.random() * (maxLimit + 1));
    num2 = Math.floor(Math.random() * (maxLimit - num1 + 1));
    correctAnswer = num1 + num2;
  } else {
    // Ensure subtraction doesn't go below 0
    num1 = Math.floor(Math.random() * (maxLimit + 1));
    num2 = Math.floor(Math.random() * (num1 + 1));
    correctAnswer = num1 - num2;
  }

  document.getElementById("question").textContent = `What is ${num1} ${operation} ${num2}?`;
  document.getElementById("feedback").textContent = "";
}

function checkAnswer(answer) {
  if (answer === correctAnswer) {
    correctCount++;
    document.getElementById("feedback").style.color = "green";
    document.getElementById("feedback").textContent = "🎉 Correct!";
    updateScore();
    // Use a slight delay before next question so they see the success
    setTimeout(newQuestion, 1200);
  } else {
    wrongCount++;
    document.getElementById("feedback").style.color = "red";
    document.getElementById("feedback").textContent = "❌ Try Again!";
    updateScore();
  }
}

function createButtons() {
  const buttonsDiv = document.getElementById("buttons");
  buttonsDiv.innerHTML = ""; // Clear existing
  
  for (let i = 0; i <= maxLimit; i++) {
    const btn = document.createElement("button");
    btn.className = "num-btn";
    btn.textContent = i;
    btn.onclick = () => checkAnswer(i);
    buttonsDiv.appendChild(btn);
  }
}

// Initialize the game
createButtons();
updateScore();
newQuestion();
</script>
